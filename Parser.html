<script>
/**
 * Làm sạch chuỗi cURL từ Windows CMD
 */
function cleanCurlString(raw) {
  if (!raw) return "";
  return raw
    .replace(/\^/g, '')       // Xóa bỏ ký tự ^ của Windows CMD
    .replace(/\\"/g, '"')     // Sửa lỗi escape ngoặc kép \" thành "
    .replace(/\r?\n|\r/g, ' ') // Chuyển xuống dòng thành khoảng trắng để Regex chạy chuẩn
    .replace(/\s+/g, ' ')      // Xóa khoảng trắng thừa
    .trim();
}

function parseCurl(curlString) {
  const clean = cleanCurlString(curlString);
  const result = { url: '', method: 'GET', headers: {}, data: '' };

  // 1. Lấy URL (Tìm chuỗi nằm sau curl hoặc chuỗi http)
  const urlMatch = clean.match(/curl\s+['"]?([^'"]+)/i) || clean.match(/['"]?(https?:\/\/[^'"]+)['"]?/);
  if (urlMatch) result.url = urlMatch[1];

  // 2. Nhận diện Method
  const xMethod = clean.match(/-X\s+([A-Z]+)/i);
  if (xMethod) {
    result.method = xMethod[1].toUpperCase();
  } else if (/--data|--data-raw|--data-binary|-d\s+/.test(clean)) {
    result.method = 'POST';
  }

  // 3. Lấy Headers (Dùng vòng lặp để bắt trọn các chuỗi dài như Cookie)
  // Regex này tìm các cụm nằm sau -H cho đến khi gặp flag tiếp theo hoặc hết chuỗi
  const headerRegex = /-H\s+['"]([^'"]+)['"]/g;
  let match;
  while ((match = headerRegex.exec(clean)) !== null) {
    const fullHeader = match[1];
    const splitIdx = fullHeader.indexOf(':');
    if (splitIdx !== -1) {
      const key = fullHeader.substring(0, splitIdx).trim();
      const value = fullHeader.substring(splitIdx + 1).trim();
      result.headers[key] = value;
    }
  }

  // 4. Lấy Body Data
  const dataMatch = clean.match(/--data(?:-raw|-binary)?\s+['"]([\s\S]+?)['"]/) 
                 || clean.match(/-d\s+['"]([\s\S]+?)['"]/);
  if (dataMatch) result.data = dataMatch[1];

  return result;
}

function replaceEnvVars(text, env) {
  if (!text || typeof text !== 'string') return text;
  return text.replace(/\{\{(.+?)\}\}/g, (match, key) => env[key.trim()] || match);
}
</script>
